name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: TEST

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint & Format Check
        run: |
          bun run lint
          bun run format

      - name: Run Tests
        run: bun test

      - name: Build Application
        run: bun run build
        env:
          TOKEN_STORAGE: ${{ secrets.TOKEN_STORAGE }}
          NEXT_PUBLIC_OASIS_API_URL: "https://oasis-v2.utb-univ.ac.id/api"
          NEXT_PUBLIC_ELEARNING_API_URL: "https://elearning-v2.utb-univ.ac.id/api"
